name: 多平台构建
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: dmg
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: nsis

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 安装 Linux 依赖
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: 安装前端依赖
        run: npm ci

      - name: 构建
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          rm -rf src-tauri/target/release/bundle
          npm run tauri build -- --target ${{ matrix.target }}

      - name: 构建
        shell: bash
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: |
          npm run tauri build -- --target ${{ matrix.target }} 2>&1

      - name: 重命名产物
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          # --target 参数导致输出在 src-tauri/target/$TARGET/release/bundle 下
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          echo "Looking for artifacts in: $BUNDLE_DIR"
          ls -la "$BUNDLE_DIR" 2>/dev/null || echo "No bundle dir at $BUNDLE_DIR"
          case "${{ matrix.ext }}" in
            dmg) SRC=$(find "$BUNDLE_DIR" -name "*.dmg" | head -1) ;;
            nsis) SRC=$(find "$BUNDLE_DIR" -name "*.exe" -o -name "*.msi" | head -1) ;;
          esac
          if [ -z "$SRC" ]; then
            echo "No artifact found, checking default bundle path..."
            BUNDLE_DIR="src-tauri/target/release/bundle"
            ls -la "$BUNDLE_DIR" 2>/dev/null || echo "No bundle dir there either"
            case "${{ matrix.ext }}" in
              dmg) SRC=$(find "$BUNDLE_DIR" -name "*.dmg" | head -1) ;;
              nsis) SRC=$(find "$BUNDLE_DIR" -name "*.exe" -o -name "*.msi" | head -1) ;;
            esac
          fi
          if [ -z "$SRC" ]; then echo "No artifact found!"; exit 1; fi
          EXT="${SRC##*.}"
          DST="zhibi-$TAG-${{ matrix.ext }}.$EXT"
          echo "Moving $SRC -> $DST"
          cp "$SRC" "$DST"
          gh release create "$TAG" --title "执笔 $TAG" --notes "自动构建" --latest 2>/dev/null || true
          gh release upload "$TAG" "$DST" --clobber
