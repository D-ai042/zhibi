name: 多平台构建
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: dmg
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: nsis

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 安装 Linux 依赖
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: 安装前端依赖
        run: npm ci

      - name: 构建
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          rm -rf src-tauri/target/release/bundle
          npm run tauri build -- --target ${{ matrix.target }}

      - name: 构建
        shell: bash
        run: |
          npm run tauri build 2>&1

      - name: 重命名产物
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          BUNDLE_DIR="src-tauri/target/release/bundle"
          case "${{ matrix.ext }}" in
            dmg) SRC=$(find "$BUNDLE_DIR/dmg" -name "*.dmg" | head -1) ;;
            nsis) SRC=$(find "$BUNDLE_DIR/nsis" -name "*.exe" | head -1) ;;
          esac
          EXT="${SRC##*.}"
          DST="$BUNDLE_DIR/zhibi-$TAG-${{ matrix.ext }}.$EXT"
          echo "SRC=$SRC DST=$DST"
          mv "$SRC" "$DST"
          gh release create "$TAG" --title "执笔 $TAG" --notes "自动构建" --latest 2>/dev/null || true
          gh release upload "$TAG" "$DST" --clobber
