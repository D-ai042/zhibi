name: 多平台构建
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: AppImage
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: dmg
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: nsis

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 安装 Linux 依赖
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: 安装前端依赖
        run: npm ci

      - name: 构建
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          rm -rf src-tauri/target/release/bundle
          npm run tauri build -- --target ${{ matrix.target }}

      - name: 上传到 Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          find src-tauri/target/release/bundle -type f \( -name "*.exe" -o -name "*.msi" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" \) 2>/dev/null | while read f; do
            echo "Uploading $f"
            gh release upload "$TAG" "$f" --clobber
          done
