name: 多平台构建
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: dmg-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: dmg-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: nsis

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 安装 Linux 依赖
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: 安装前端依赖
        run: npm ci

      - name: 构建（含签名）
        shell: bash
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: |
          TAG="${{ github.ref_name }}"
          rm -rf src-tauri/target/release/bundle
          npm run tauri build -- --target ${{ matrix.target }} 2>&1

      - name: 重命名产物
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          echo "Looking for artifacts in: $BUNDLE_DIR"
          ls -la "$BUNDLE_DIR" 2>/dev/null || echo "No bundle dir at $BUNDLE_DIR"
          case "${{ matrix.ext }}" in
            dmg) SRC=$(find "$BUNDLE_DIR" -name "*.dmg" | head -1) ;;
            nsis) SRC=$(find "$BUNDLE_DIR" -name "*.exe" | head -1) ;;
          esac
          if [ -z "$SRC" ]; then
            echo "No primary artifact, trying secondary..."
            case "${{ matrix.ext }}" in
              dmg) SRC=$(find "$BUNDLE_DIR" -name "*.dmg" | head -1) ;;
              nsis) SRC=$(find "$BUNDLE_DIR" -name "*.msi" | head -1) ;;
            esac
          fi
          if [ -z "$SRC" ]; then
            echo "No artifact found, checking default bundle path..."
            BUNDLE_DIR="src-tauri/target/release/bundle"
            ls -la "$BUNDLE_DIR" 2>/dev/null || echo "No bundle dir there either"
            case "${{ matrix.ext }}" in
              dmg) SRC=$(find "$BUNDLE_DIR" -name "*.dmg" | head -1) ;;
              nsis) SRC=$(find "$BUNDLE_DIR" -name "*.exe" | head -1) ;;
            esac
            if [ -z "$SRC" ]; then
              case "${{ matrix.ext }}" in
                nsis) SRC=$(find "$BUNDLE_DIR" -name "*.msi" | head -1) ;;
              esac
            fi
          fi
          if [ -z "$SRC" ]; then echo "No artifact found!"; exit 1; fi
          EXT="${SRC##*.}"
          DST="zhibi-$TAG-${{ matrix.ext }}.$EXT"
          echo "Moving $SRC -> $DST"
          cp "$SRC" "$DST"
          gh release create "$TAG" --title "执笔 $TAG" --notes "自动构建" --latest 2>/dev/null || true
          gh release upload "$TAG" "$DST" --clobber

  # Windows 独立 job：生成 latest.json 上传到 Release
  generate-update-json:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: 生成 latest.json
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"

          # 构建下载 URL（通过 ghfast.top 镜像加速国内访问）
          # 找出实际上传的 Windows 文件扩展名（优先 .exe）
          WIN_EXT="msi"
          for f in zhibi-$TAG-nsis.*; do
            if [ -f "$f" ]; then
              case "$f" in
                *.exe) WIN_EXT="exe" ;;
                *.msi) WIN_EXT="msi" ;;
              esac
              break
            fi
          done
          WIN_URL="https://ghfast.top/github.com/D-ai042/zhibi/releases/download/$TAG/zhibi-$TAG-nsis.$WIN_EXT"
          MAC_INTEL_URL="https://ghfast.top/github.com/D-ai042/zhibi/releases/download/$TAG/zhibi-$TAG-dmg-x64.dmg"
          MAC_ARM_URL="https://ghfast.top/github.com/D-ai042/zhibi/releases/download/$TAG/zhibi-$TAG-dmg-arm64.dmg"

          cat > latest.json << EOF
          {
            "version": "$VERSION",
            "notes": "执笔 v$VERSION 自动构建更新",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "",
                "url": "$WIN_URL"
              },
              "darwin-x86_64": {
                "signature": "",
                "url": "$MAC_INTEL_URL"
              },
              "darwin-aarch64": {
                "signature": "",
                "url": "$MAC_ARM_URL"
              }
            }
          }
          EOF

          echo "=== latest.json ==="
          cat latest.json

          # 上传到 Release
          gh release upload "$TAG" latest.json --clobber
          echo "✅ latest.json 已上传到 Release $TAG"
