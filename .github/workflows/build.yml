name: 多平台构建
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: AppImage
            rust-target: x86_64-unknown-linux-gnu
            label: linux
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: dmg
            rust-target: x86_64-apple-darwin
            label: mac-intel
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: dmg
            rust-target: aarch64-apple-darwin
            label: mac-arm
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: nsis
            rust-target: x86_64-pc-windows-msvc
            label: win

    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: 安装 Linux 依赖
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: 安装前端依赖
        run: npm ci

      - name: 构建并上传 Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          args: --target ${{ matrix.rust-target }}

      - name: 重命名产物
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          case "${{ matrix.ext }}" in
            dmg)      NEW_NAME="执笔-v$TAG-${{ matrix.label }}.dmg" ;;
            nsis)     NEW_NAME="执笔-v$TAG-${{ matrix.label }}.exe" ;;
            AppImage) NEW_NAME="执笔-v$TAG-${{ matrix.label }}.AppImage" ;;
          esac
          curl -s -X PATCH "$(gh release view "$TAG" --json assets -q '.assets[-1].url')" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -d "{\"name\":\"$NEW_NAME\"}"

      # 生成 updater 用的 latest.json 签名（Windows only，避免多平台覆盖）
      - name: 生成并上传 latest.json (用于自动更新)
        if: matrix.label == 'win'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          cat > latest.json << EOF
{
  "version": "${VERSION}",
  "notes": "新版本 ${TAG}",
  "pub_date": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
  "platforms": {
    "windows-x86_64": {
      "signature": "",
      "url": "https://github.com/D-ai042/zhibi/releases/download/${TAG}/执笔-v${TAG}-win.exe"
    },
    "darwin-x86_64": {
      "signature": "",
      "url": "https://github.com/D-ai042/zhibi/releases/download/${TAG}/执笔-v${TAG}-mac-intel.dmg"
    },
    "darwin-aarch64": {
      "signature": "",
      "url": "https://github.com/D-ai042/zhibi/releases/download/${TAG}/执笔-v${TAG}-mac-arm.dmg"
    },
    "linux-x86_64": {
      "signature": "",
      "url": "https://github.com/D-ai042/zhibi/releases/download/${TAG}/执笔-v${TAG}-linux.AppImage"
    }
  }
}
EOF
          gh release upload "$TAG" latest.json --clobber
